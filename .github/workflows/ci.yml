name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --production
      - run: pnpm test
      - run: pnpm build
